name: plankifier-experiment

deployment:
  htcondor:
    - kind: central-manager
      labels:
        - central-manager
    - kind: submit
      labels:
        - submit
    - kind: execute
      labels:
        - execute-cloud
    - kind: execute
      labels:
        - execute-edge
      config_file: config/execute.conf

sites:
  - kind: chameleon-edge
    walltime: "02:00:00"
    lease_name: edge-lease
    rc_file: secrets/edge-app-cred-oac-edge-openrc.sh
    resources:
      machines:
        - labels:
            - submit
            - execute-edge
          machine_name: raspberrypi4-64
          count: 1
          container:
            name: execute
            image: pegasus/plankifier

  - kind: chameleon
    walltime: "02:00:00"
    lease_name: tacc-lease
    rc_file: secrets/tacc-app-cred-oac-edge-openrc.sh
    key_name: mayani-mac-mini
    image: CC-Ubuntu18.04
    resources:
      machines:
        - labels:
            #- central-manager
            - submit
            - execute-cloud
          flavour: compute_zen3
          number: 1
          image: CC-Ubuntu22.04
        - labels:
            - submit
            - execute-edge
          flavour: compute_zen3
          number: 1
          image: CC-Ubuntu22.04
      networks:
        - sharednet1

  - kind: fabric
    rc_file: secrets/fabric_rc
    walltime: "2:00:00"
    name_prefix: process
    resources:
      machines:
        # Get IPv4 Management IP
        - labels:
            - submit
            - central-manager
            - execute-cloud
          site: UCSD
          image: default_rocky_8
          flavour: big
          number: 1
      networks:
        - labels:
            - v4
          name: one
          kind: FABNetv4
          site: UCSD
          nic:
            kind: SmartNIC
            model: ConnectX-5

experiments:
  - kind: pegasus
    name: plankifier-experiment
    count: 1
    main: ./workflow.py
    timeout: 3600
    submit_node_labels:
      - submit
    inputs:
      - labels:
          - execute-edge
        src: bin/train.py
        dst: /srv/plankifier/
      - labels:
          - execute-edge
        src: bin/predict.py
        dst: /srv/plankifier/
    setup:
      - labels:
          - submit
        script: |
          sudo chmod +x workflow.py

          echo "Condor Q"
          condor_q

          echo "Condor Status"
          condor_status
      - labels:
          - execute-edge
        script: |
          sudo chmod +x /srv/plankifier/train.py /srv/plankifier/predict.py
    outputs:
      - labels:
          - submit
        src: ~kiso/kiso-plankifier-experiment/output/count.txt
        dst: ./
